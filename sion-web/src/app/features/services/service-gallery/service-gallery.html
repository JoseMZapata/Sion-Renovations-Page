<div class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4" (click)="close.emit()">
  <div class="bg-white w-full max-w-4xl max-h-[90vh] overflow-y-auto p-4 sm:p-6 md:p-8 rounded-xl" (click)="$event.stopPropagation()">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-xl sm:text-2xl font-bold">{{ service.name }}</h2>
      <button class="text-3xl leading-none hover:text-gray-600" (click)="close.emit()">&times;</button>
    </div>

    <ng-container *ngIf="service.gallery.length; else emptyGallery">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4">
        <img
          *ngFor="let img of service.gallery"
          [src]="img"
          class="w-full aspect-[4/3] object-cover rounded-lg">
      </div>
    </ng-container>

    <ng-template #emptyGallery>
      <p class="text-center text-gray-500 py-12 sm:py-16 text-sm sm:text-base">
        No work samples available yet.
      </p>
    </ng-template>
  </div>
</div>
