<div class="fixed inset-0 bg-black/60 flex items-center justify-center z-50">

  <div class="bg-white w-[90%] md:w-125 p-6 rounded-xl">

    <h2 class="text-2xl font-bold mb-4">
      Write us
    </h2>

    <textarea
      class="w-full border p-3 rounded-md h-37.5"
      placeholder="Suggest a new service...">
    </textarea>

    <div class="flex justify-end mt-4 gap-3">

      <button
        class="px-4 py-2"
        (click)="close.emit()">
        Cancel
      </button>

      <button
        class="px-4 py-2 bg-black text-white rounded">
        Send
      </button>

    </div>

  </div>

</div>
