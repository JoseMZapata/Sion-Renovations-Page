<ng-container *ngIf="!service.isSpecial; else specialCard">
  <button class="card-btn">
    <div class="card-image-wrapper">
      <img
        [src]="service.image"
        [alt]="service.name"
        class="card-image">
    </div>
    <p class="card-title">
      {{ service.name }}
    </p>
  </button>
</ng-container>

<ng-template #specialCard>
  <button class="special-btn">

    <div class="special-left">
      <img
        src="assets/logos/Sion_Renovations_Original_logo-removebg-preview.png"
        alt="Sion Renovations"
        class="special-logo">
    </div>

    <div class="special-right">

      <div class="paint-title">
        <span>DO YOU NEED OTHER</span>
        <span>SERVICE?</span>
      </div>

      <div class="write-row">

        <div class="write-action">
          <span class="write-link">WRITE US!</span>
        </div>

        <div class="write-description">
          YOUR OPINION MATTERS<br>
          A LOT!
        </div>

      </div>

    </div>

  </button>
</ng-template>
