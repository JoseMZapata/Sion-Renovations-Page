<ng-container *ngIf="!service.isSpecial; else specialCard">
  <button class="card-btn">
    <div class="card-image-wrapper">
      <img
        [src]="service.image"
        [alt]="service.name"
        class="card-image">
    </div>
    <p class="card-title">
      {{ service.name }}
    </p>
  </button>
</ng-container>

<ng-template #specialCard>
  <button class="special-btn">
    <span class="special-icon">+</span>
    <p class="special-text">
      Suggest a new service<br>
      <span class="special-link">WRITE US</span>
    </p>
  </button>
</ng-template>
