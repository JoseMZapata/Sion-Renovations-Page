<header class="navbar">
  <div class="navbar__inner">
    <button class="navbar__brand" type="button" aria-label="Sion Renovations home">
      <img src="assets/logos/sionheadnew.png" alt="Sion Renovations Logo" class="navbar__logo">
    </button>

    <button
      class="navbar__menuToggle"
      type="button"
      [attr.aria-expanded]="menuOpen"
      aria-controls="mobile-navigation"
      aria-label="Open navigation menu"
      (click)="toggleMenu()"
    >
      <img src="assets/icons/hamburger-icon.png" alt="Menu" class="navbar__menuIcon" aria-hidden="true">
    </button>

    <nav class="navbar__nav" aria-label="Primary navigation">
      <button class="navbar__link navbar__link--active" type="button" (click)="closeMenu()">HOME</button>
      <button class="navbar__link navbar__link--dropdown" type="button" (click)="closeMenu()">
        <span>SERVICES</span>
        <span class="navbar__caret" aria-hidden="true">▼</span>
      </button>
      <button class="navbar__link" type="button" (click)="closeMenu()">PROJECTS</button>
      <button class="navbar__link" type="button" (click)="closeMenu()">ABOUT US</button>
      <img src="assets/logos/freeQuote.png" class="navbar__quote" alt="">
    </nav>

    <div
      class="navbar__backdrop"
      [class.navbar__backdrop--open]="menuOpen"
      (click)="closeMenu()"
      aria-hidden="true"
    ></div>

    <div
      id="mobile-navigation"
      class="navbar__mobilePanel"
      [class.navbar__mobilePanel--open]="menuOpen"
      role="dialog"
      aria-modal="true"
      aria-label="Primary navigation"
    >
      <div class="navbar__mobilePanelHeader">
        <span class="navbar__mobilePanelTitle">Menu</span>
        <button class="navbar__mobileClose" type="button" aria-label="Close navigation menu" (click)="closeMenu()">×</button>
      </div>

      <div class="navbar__mobileLinks">
        <button class="navbar__mobileLink navbar__mobileLink--active" type="button" (click)="closeMenu()">HOME</button>
        <button class="navbar__mobileLink navbar__mobileLink--dropdown" type="button" (click)="closeMenu()">
          <span>SERVICES</span>
          <span class="navbar__caret" aria-hidden="true">▼</span>
        </button>
        <button class="navbar__mobileLink" type="button" (click)="closeMenu()">PROJECTS</button>
        <button class="navbar__mobileLink" type="button" (click)="closeMenu()">ABOUT US</button>
        <img src="assets/logos/freeQuote.png" class="navbar__quote navbar__quote--mobile" alt="">
      </div>
    </div>
  </div>
</header>
