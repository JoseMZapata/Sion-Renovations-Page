<section class="hero-container" [class.tapped]="tapped" (click)="toggleHero()">

  <!-- Imagen de fondo -->
  <div
    class="hero-background"
    [style.background-image]="'url(https://res.cloudinary.com/dbifigwjd/image/upload/v1782328324/casona_3_tvbehx.png)'">
  </div>

  <!-- Overlay -->
  <div class="hero-overlay"></div>

  <!-- Contenido -->
  <div class="hero-content">

    <div class="flex flex-col md:flex-row items-center gap-8">

      <!-- Logo -->
      <img
        src="assets/logos/Sion-large-logo.svg"
        alt="Logo"
        class="hero-logo">

      <!-- Texto -->
      <div>
        <h1 class="hero-title">
          Building your vision
        </h1>

        <h1 class="hero-subtitle">
          Solid foundations for your projects
        </h1>
      </div>

    </div>

    <!-- Botón -->
    <button
      (click)="scrollToServices(); $event.stopPropagation()"
      class="hero-button">
      OUR SERVICES
    </button>

  </div>

</section>
